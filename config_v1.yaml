# FILE: config_v1.yaml
# DÙNG CHO: Giai đoạn 1 (Pre-training với Data Sạch/Classification)

# ============== ĐƯỜNG DẪN ==============
paths:
  raw_data: "./RAW_DATA_CLEAN"       # Nơi chứa các thư mục: cercospora, rust, healthy...
  output: "./dataset_v1_clean"       # Nơi xuất ra dataset chuẩn YOLO

# ============== TỶ LỆ CHIA DATA ==============
split:
  train: 0.85      # Tăng dữ liệu train để mô hình học đặc trưng tốt hơn
  val: 0.15        # Vẫn đủ để theo dõi overfitting
  test: 0.00       # 0% (Không cần thiết cho giai đoạn này)
  seed: 42         # Số ngẫu nhiên cố định để kết quả giống nhau mỗi lần chạy

# ============== DANH SÁCH LỚP (7 LỚP) ==============
label_mapping:
  # Class 0: Cà phê - Gỉ sắt
  0:
    standard_name: "cafe_gisat"
    aliases:
      - "rust"
      - "coffee_rust"
      - "leaf_rust"
      - "hemileia_vastatrix"
      - "coffee_leaf_rust"

  # Class 1: Cà phê - Đốm mắt cua
  1:
    standard_name: "cafe_dommatcua"
    aliases:
      - "cercospora"
      - "coffee_cercospora"
      - "brown_eye_spot"
      - "brown_leaf_spot"

  # Class 2: Cà phê - Khỏe mạnh
  2:
    standard_name: "cafe_khoe"
    aliases:
      - "healthy"
      - "coffee_healthy"
      - "healthy_leaf"
      - "healthy_coffee"

  # Class 3: Sầu riêng - Cháy lá
  3:
    standard_name: "saurieng_chayla"
    aliases:
      - "leaf_blight"
      - "durian_leaf_blight"
      - "rhizoctonia"
      - "phytophthora"
      - "chay_la"

  # Class 4: Sầu riêng - Đốm tảo
  4:
    standard_name: "saurieng_domtao"
    aliases:
      - "algal_leaf_spot"
      - "algal_spot"
      - "cephaleuros"
      - "dom_tao"

  # Class 5: Sầu riêng - Khỏe mạnh
  5:
    standard_name: "saurieng_khoe"
    aliases:
      - "healthy_durian"
      - "durian_healthy"
      - "no_disease"

  # Class 6: Rác / Nền (QUAN TRỌNG ĐỂ CHỐNG SELFIE/MÈO)
  6:
    standard_name: "garbage"
    aliases:
      - "garbage"
      - "background"
      - "negative"
      - "random"
      - "selfie"

# ============== TẠO NHÃN TỰ ĐỘNG ==============
label_generation:
  # VÌ LÀ DATA SẠCH (CHƯA CÓ NHÃN), BẬT CÁI NÀY LÊN
  default_bbox:
    enabled: true
    x_center: 0.5
    y_center: 0.5
    width: 0.95    # Vẽ khung gần hết ảnh (trừ viền)
    height: 0.95

  existing_labels:
    remap_class_ids: false   # Data sạch thường không có file .txt để remap

# ============== XỬ LÝ ==============
processing:
  copy_method: "copy"
  overwrite_existing: true   # Tự động ghi đè folder cũ
  
  quality_checks:
    remove_duplicates: true  # Xóa ảnh trùng lặp
    check_corrupted: true    # Xóa ảnh lỗi không mở được
    min_file_size: 2048      # Bỏ qua file quá nhỏ/nhiễu (<2KB)

# ============== ĐẦU RA ==============
output:
  create_data_yaml: true
  save_statistics: true
  create_visualizations: true

# =============================================================================
# MAT THÂN NÔNG — Chuẩn hóa thống nhất (6 lớp lá, YOLOv8)
# Quét thực tế RAW_DATA_CLEAN: Coffee (CSV + coffee-leaf-diseases), Durian
# (train|val|test/<TÊN_LỚP>/), garbage/ (nhãn rỗng).
# Chạy: python setup_all_data.py   | Cấu hình: config_unified.yaml
# Đầu ra: datasets/leaf_data/  +  runs/data_verification/
# =============================================================================
mat_than_nong:
  unified_pipeline_script: "./setup_all_data.py"
  unified_config: "./config_unified.yaml"
  yolo_dataset_yaml: "./datasets/leaf_data/data.yaml"
  class_count: 6